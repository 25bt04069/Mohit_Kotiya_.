<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .payment-container{
            background:#fff;
            width:100%;
            max-width:450px;
            padding:30px;
            border-radius:12px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
            color:#555;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:16px;
        }

        .row{
            display:flex;
            gap:10px;
        }

        .row .form-group{
            flex:1;
        }

        button{
            width:100%;
            padding:14px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0b5ed7;
        }

        .message{
            margin-top:15px;
            text-align:center;
            font-weight:bold;
        }

        .error{
            color:red;
        }

        .success{
            color:green;
        }

        @media(max-width:500px){
            .row{
                flex-direction:column;
            }
        }
    </style>
</head>
<body>

<div class="payment-container">
    <h2>Secure Payment</h2>

    <form id="paymentForm">
        <div class="form-group">
            <label>Cardholder Name</label>
            <input type="text" required>
        </div>

        <div class="form-group">
            <label>Card Number</label>
            <input
                type="text"
                id="cardNumber"
                maxlength="19"
                placeholder="1234 5678 9012 3456"
                required
            >
        </div>

        <div class="row">
            <div class="form-group">
                <label>Expiry Date</label>
                <input type="text" placeholder="MM/YY" required>
            </div>

            <div class="form-group">
                <label>CVV</label>
                <input type="password" maxlength="3" required>
            </div>
        </div>

        <button type="submit">Submit Payment</button>

        <div id="message" class="message"></div>
    </form>
</div>

<script src="script.js"></script>

</body>
</html>
